name: Afhængighedsreview

# Fejler en PR, hvis den introducerer afhængigheder med kendte
# sikkerhedshuller eller licenser, der er uforenelige med projektet.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review af nye afhængigheder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Tilpas så listen matcher projektets åben kildekode-licens.
          allow-licenses: >-
            MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC,
            MPL-2.0, Python-2.0, PSF-2.0, Unlicense, CC0-1.0
